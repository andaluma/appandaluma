<style>
:root{
  color-scheme: light;
  forced-color-adjust: none;
  --coral:#E04F28;--berry:#B83368;--teal:#0A7A88;
  --amber:#C98A10;--forest:#2D5C3A;--dark:#1A1208;
  --muted:#7A6E5A;--sand:#EDE5D4;--cream:#F7F2E8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;height:-webkit-fill-available;overflow-x:hidden;width:100%}body{min-height:100%;min-height:-webkit-fill-available;height:100%;width:100%;overflow-x:hidden;background:#F7F2E8 !important;color:#1A1208 !important;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column}
#root{width:100%;max-width:480px;margin:0 auto;min-height:100vh;min-height:-webkit-fill-available;height:100%;display:flex;flex-direction:column;flex:1;overflow-x:hidden}

/* ── SETUP ── */
#setup{display:none;min-height:100vh;flex-direction:column}
.su-hero{
  background:var(--dark);padding:56px 28px 32px;
  padding-top:max(56px,env(safe-area-inset-top,56px));
  flex-shrink:0;position:relative;overflow:hidden;
}
.su-hero::before{
  content:'';position:absolute;top:-60px;right:-60px;
  width:200px;height:200px;border-radius:50%;
  background:var(--coral);opacity:0.15;
}
.su-hero::after{
  content:'';position:absolute;bottom:-40px;left:-40px;
  width:140px;height:140px;border-radius:50%;
  background:var(--teal);opacity:0.15;
}
.su-eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:16px;font-weight:600}
/* LOGO GRID */
.logo-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;width:100px;margin-bottom:16px}
.logo-tile{
  display:flex;align-items:center;justify-content:center;
  height:46px;border-radius:4px;
  font-family:'Playfair Display',serif;font-size:15px;font-weight:700;
  color:white;letter-spacing:0.04em;
}
.su-tagline{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.5}
.su-card{
  background:var(--cream);border-radius:22px 22px 0 0;
  flex:1;padding:26px 22px 40px;
  padding-bottom:max(40px,env(safe-area-inset-bottom,40px));overflow-y:auto;
}
.su-dots{display:flex;gap:6px;margin-bottom:22px}
.su-dot{width:28px;height:4px;border-radius:2px}
.su-lbl{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}
.su-lbl span{font-weight:400;text-transform:none;letter-spacing:0;font-size:10px;margin-left:6px;opacity:0.7}
.su-ta{width:100%;height:100px;padding:12px 14px;border:1.5px solid var(--sand);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:12px;background:white;resize:none;outline:none;color:var(--dark);line-height:1.5}
.su-ta:focus,.su-in:focus{border-color:var(--coral)}
.su-in{width:100%;padding:12px 14px;border:1.5px solid var(--sand);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;background:white;outline:none;color:var(--dark)}
.su-hint{font-size:11px;color:var(--muted);margin-top:7px;line-height:1.6}
.su-hint a{color:var(--coral);text-decoration:none;font-weight:600}
.su-section{margin-bottom:20px}
.btn-go{width:100%;padding:16px;background:var(--coral);color:white;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(224,79,40,0.3)}
.btn-go:active{opacity:0.85}
.btn-skip{width:100%;padding:12px;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;margin-top:6px}

/* ── HEADER ── */
#hdr{
  background:var(--dark);color:white;
  padding:max(44px,env(safe-area-inset-top,44px)) 18px 14px;
  flex-shrink:0;
}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
/* inline logo grid */
.hdr-logo-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;width:52px}
.hdr-tile{display:flex;align-items:center;justify-content:center;height:24px;border-radius:3px;font-family:'Playfair Display',serif;font-size:8px;font-weight:700;color:white;letter-spacing:0.04em}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-sync{font-size:10px;opacity:0.4}
.gear-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:2px 4px;opacity:0.6;line-height:1}
.btn-gcal{
  background:rgba(10,122,136,0.3);border:1px solid rgba(10,122,136,0.5);
  color:white;border-radius:6px;padding:5px 10px;
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;
}
.btn-gcal.connected{background:rgba(10,122,136,0.5);border-color:var(--teal)}
/* time zones - each in its own color */
.tz-bar{display:flex;gap:0;border-radius:8px;overflow:hidden}
.tz-item{flex:1;padding:8px 10px;display:flex;flex-direction:column;align-items:center}
.tz-lbl{font-size:8px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.7;margin-bottom:2px;font-weight:600}
.tz-time{font-size:15px;font-weight:700}

/* ── OWNER BAR ── */
#owner-wrap{flex-shrink:0;padding:10px 14px;background:var(--dark);border-top:1px solid rgba(255,255,255,0.06)}
.owner-bar{display:flex;gap:6px}
.obtn{
  flex:1;padding:8px 4px;border:none;border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.07);
  transition:all 0.12s;text-align:center;letter-spacing:0.02em;
}
.obtn[data-o=andre].on{background:var(--coral);color:white}
.obtn[data-o=daniella].on{background:var(--berry);color:white}
.obtn[data-o=both].on{background:var(--teal);color:white}

/* ── WEEK STRIP ── */
#week-wrap{
  display:flex;align-items:center;gap:2px;padding:10px 10px;
  background:var(--dark);flex-shrink:0;overflow-x:auto;
  border-top:1px solid rgba(255,255,255,0.04);
}
.wk-arr{background:none;border:none;cursor:pointer;font-size:22px;color:rgba(255,255,255,0.25);padding:4px 6px;flex-shrink:0;line-height:1}
.wk-day{display:flex;flex-direction:column;align-items:center;min-width:40px;padding:7px 2px;border-radius:8px;cursor:pointer;flex-shrink:0;transition:background 0.1s}
.wk-day.tod:not(.sel){background:rgba(255,255,255,0.07)}
.wk-day.sel{background:var(--coral)}
.wk-dn{font-size:9px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,0.3)}
.wk-day.sel .wk-dn,.wk-day.tod .wk-dn{color:rgba(255,255,255,0.7)}
.wk-num{font-size:17px;font-weight:700;line-height:1.2;margin:2px 0;color:rgba(255,255,255,0.5)}
.wk-day.sel .wk-num,.wk-day.tod .wk-num{color:white}
/* colored dots per venture */
.wk-dots{display:flex;gap:2px;justify-content:center;min-height:6px}
.wk-vdot{width:5px;height:5px;border-radius:50%}

/* ── DAY VIEW ── */
#day-view{flex:1;overflow-y:auto;padding-bottom:80px;background:#F7F2E8 !important;-webkit-overflow-scrolling:touch;min-height:0}
.day-hdr{padding:18px 20px 10px;display:flex;justify-content:space-between;align-items:baseline;border-bottom:1.5px solid var(--sand)}
.day-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700}
.day-meta{font-size:11px;color:var(--muted)}
.tlist{padding:12px 20px 0;display:flex;flex-direction:column;gap:8px}

/* ── TASK ITEM - bolder venture colors ── */
.ti{-webkit-forced-color-adjust:none;forced-color-adjust:none;
  background:#FFFFFF !important;border-radius:10px;
  display:flex;align-items:center;gap:12px;
  padding:0;overflow:hidden;
  box-shadow:0 1px 4px rgba(26,18,8,0.07);
  transition:opacity 0.15s;
}
.ti-accent{width:5px;flex-shrink:0;align-self:stretch}
.ti[data-v=andaluma] .ti-accent{background:var(--coral)}
.ti[data-v=vae] .ti-accent{background:var(--teal)}
.ti[data-v=baraca] .ti-accent{background:var(--amber)}
.ti[data-v=personal] .ti-accent{background:var(--berry)}
.ti[data-v=andaluma2] .ti-accent{background:linear-gradient(180deg,var(--coral) 50%,var(--berry) 50%)}
.ti-inner{display:flex;align-items:center;gap:12px;flex:1;padding:12px 12px 12px 10px}
.ti.done{opacity:0.35}
.ti.rolled .ti-inner{background:#fffcf5}
.ti-cb{width:22px;height:22px;border-radius:50%;border:2px solid var(--sand);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all 0.12s;cursor:pointer}
.ti[data-v=andaluma] .ti-cb,.ti[data-v=andaluma2] .ti-cb{border-color:var(--coral)}
.ti[data-v=vae] .ti-cb{border-color:var(--teal)}
.ti[data-v=baraca] .ti-cb{border-color:var(--amber)}
.ti[data-v=personal] .ti-cb{border-color:var(--berry)}
.ti.inprogress[data-v=andaluma] .ti-cb,.ti.inprogress[data-v=andaluma2] .ti-cb{background:linear-gradient(90deg,var(--coral) 50%,transparent 50%)}
.ti.inprogress[data-v=vae] .ti-cb{background:linear-gradient(90deg,var(--teal) 50%,transparent 50%)}
.ti.inprogress[data-v=baraca] .ti-cb{background:linear-gradient(90deg,var(--amber) 50%,transparent 50%)}
.ti.inprogress[data-v=personal] .ti-cb{background:linear-gradient(90deg,var(--berry) 50%,transparent 50%)}
.ti.done[data-v=andaluma] .ti-cb,.ti.done[data-v=andaluma2] .ti-cb{background:var(--coral);border-color:var(--coral);color:white}
.ti.done[data-v=vae] .ti-cb{background:var(--teal);border-color:var(--teal);color:white}
.ti.done[data-v=baraca] .ti-cb{background:var(--amber);border-color:var(--amber);color:white}
.ti.done[data-v=personal] .ti-cb{background:var(--berry);border-color:var(--berry);color:white}
.ti-body{flex:1;min-width:0}
.ti-title{font-size:14px;font-weight:500;line-height:1.4}
.ti.done .ti-title{text-decoration:line-through}
.ti-tags{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap}
.vbadge{font-size:8px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:2px 7px;border-radius:3px;color:white}
.vbadge[data-v=andaluma],.vbadge[data-v=andaluma2]{background:var(--coral)}
.vbadge[data-v=vae]{background:var(--teal)}
.vbadge[data-v=baraca]{background:var(--amber)}
.vbadge[data-v=personal]{background:var(--berry)}
.tag-roll{font-size:9px;color:var(--amber);background:rgba(201,138,16,0.1);padding:2px 6px;border-radius:3px;font-weight:600}
.tag-rec{font-size:9px;color:var(--forest);background:rgba(45,92,58,0.1);padding:2px 6px;border-radius:3px;font-weight:600}
.tag-own{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600;color:white}
.tag-own[data-o=andre]{background:var(--coral)}
.tag-own[data-o=daniella]{background:var(--berry)}
.ti-more{background:none;border:none;cursor:pointer;color:var(--muted);font-size:22px;padding:4px 4px;flex-shrink:0;line-height:1}

/* ── SECTION DIVIDERS with color ── */
.sec-divider{
  display:flex;align-items:center;gap:10px;
  padding:14px 20px 8px;margin-top:4px;
}
.sec-divider-line{flex:1;height:1.5px}
.sec-divider-lbl{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;white-space:nowrap}

/* ── CAL EVENTS ── */
.cal-ev{background:rgba(10,122,136,0.08);border-left:3px solid var(--teal);border-radius:8px;padding:9px 14px;margin:0 16px 6px;display:flex;gap:10px;align-items:flex-start}
.cal-time{font-size:11px;font-weight:600;color:var(--teal);white-space:nowrap;flex-shrink:0}
.cal-title{font-size:13px;font-weight:500}

/* ── EMPTY ── */
.empty{padding:36px 20px;text-align:center}
.empty-icon{font-size:34px;margin-bottom:10px}
.empty-txt{font-size:14px;color:var(--muted);line-height:1.7}

/* ── SOMEDAY ── */
.someday-hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 8px;border-top:2px dashed var(--sand);margin-top:12px}
.someday-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--forest)}
.someday-toggle{font-size:12px;color:var(--forest);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700}

/* ── BOTTOM NAV ── */
.nav-btn{flex:1;background:none;border:none;color:rgba(255,255,255,0.35);padding:10px 4px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'DM Sans',sans-serif;transition:color 0.12s}
.nav-btn.on{color:#FFFFFF}
.nav-btn.on .nav-icon{color:var(--coral)}
.nav-icon{font-size:18px;line-height:1}
.nav-lbl{font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase}

/* ── MONEY MODULE ── */
.trip-bar{display:flex;gap:6px;padding:10px 14px;background:var(--dark);overflow-x:auto;border-top:1px solid rgba(255,255,255,0.05)}
.trip-chip{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.5);border:none;border-radius:16px;padding:6px 12px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.trip-chip.on{background:var(--amber);color:white}
.trip-chip.add{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.3);border:1px dashed rgba(255,255,255,0.15)}
.money-day-hdr{display:flex;justify-content:space-between;align-items:baseline;padding:14px 20px 8px;border-bottom:1px solid var(--sand)}
.money-day-title{font-family:'Playfair Display',serif;font-size:20px}
.mday-strip{display:flex;gap:4px;padding:8px 10px;background:var(--dark);overflow-x:auto;border-top:1px solid rgba(255,255,255,0.04);scrollbar-width:none}
.mday-strip::-webkit-scrollbar{display:none}
.mday-item{display:flex;flex-direction:column;align-items:center;min-width:38px;padding:6px 2px;border-radius:8px;cursor:pointer;flex-shrink:0;transition:background 0.1s}
.mday-item.tod:not(.sel){background:rgba(255,255,255,0.07)}
.mday-item.sel{background:var(--amber)}
.mday-dn{font-size:9px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,0.3)}
.mday-item.sel .mday-dn,.mday-item.tod .mday-dn{color:rgba(255,255,255,0.7)}
.mday-num{font-size:16px;font-weight:700;line-height:1.2;margin:2px 0;color:rgba(255,255,255,0.5)}
.mday-item.sel .mday-num,.mday-item.tod .mday-num{color:white}
.budget-bar-wrap{padding:10px 20px 0}
.budget-bar-bg{height:5px;background:var(--sand);border-radius:3px;overflow:hidden}
.budget-bar-fill{height:100%;border-radius:3px;transition:width 0.3s}
.budget-bar-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:4px;font-weight:600}
.exp-list{padding:12px 20px 0;display:flex;flex-direction:column;gap:7px}
.exp-item{background:white;border-radius:9px;display:flex;align-items:center;gap:10px;padding:11px 13px;box-shadow:0 1px 3px rgba(26,18,8,0.06)}
.exp-cat-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.exp-body{flex:1;min-width:0;overflow:hidden}
.exp-title{font-size:13px;font-weight:600;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exp-meta{font-size:10px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exp-amt{text-align:right;flex-shrink:0}
.exp-eur{font-size:14px;font-weight:700}
.exp-orig{font-size:10px;color:var(--muted);margin-top:1px}
.exp-more{background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px;padding:2px;flex-shrink:0}

/* ── INSIGHTS ── */
.ins-section{padding:16px 20px;border-bottom:1px solid var(--sand)}
.ins-title{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:14px}
.ins-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(0,0,0,0.04)}
.ins-row:last-child{border-bottom:none}
.ins-row-label{display:flex;align-items:center;gap:8px;font-size:13px;min-width:0;overflow:hidden}
.ins-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ins-bar-wrap{flex:1;margin:0 10px;height:4px;background:var(--sand);border-radius:2px}
.ins-bar{height:100%;border-radius:2px}
.ins-val{font-size:13px;font-weight:700;min-width:50px;text-align:right}
.ins-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.ins-stat{background:white;border-radius:10px;padding:14px;box-shadow:0 1px 3px rgba(26,18,8,0.06)}
.ins-stat-val{font-size:22px;font-weight:700;font-family:'Playfair Display',serif}
.ins-stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;font-weight:600}

/* ── FAB ── */
#fab-wrap{position:fixed;bottom:max(70px,calc(env(safe-area-inset-bottom,0px) + 70px));right:20px;display:flex;flex-direction:column;align-items:flex-end;gap:10px;z-index:50}
#fab-mic{width:46px;height:46px;border-radius:50%;background:var(--berry);color:white;font-size:17px;border:none;cursor:pointer;box-shadow:0 3px 12px rgba(184,51,104,0.4);display:flex;align-items:center;justify-content:center}
#fab-mic.listening{animation:pulse 0.7s infinite}
#fab{width:58px;height:58px;border-radius:50%;background:var(--coral);color:white;font-size:32px;border:none;cursor:pointer;box-shadow:0 4px 18px rgba(224,79,40,0.45);display:flex;align-items:center;justify-content:center;font-weight:300;line-height:1}
#fab:active,#fab-mic:active{opacity:0.82;transform:scale(0.95)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* ── MODAL ── */
#modal-overlay{position:fixed;inset:0;background:rgba(26,18,8,0.6);display:flex;flex-direction:column;justify-content:flex-end;z-index:100}
.msheet{background:var(--cream);border-radius:22px 22px 0 0;padding:20px 22px;padding-bottom:max(32px,env(safe-area-inset-bottom,32px));max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mhandle{width:40px;height:4px;background:var(--sand);border-radius:2px;margin:0 auto 20px}
.mtitle{font-family:'Playfair Display',serif;font-size:21px;margin-bottom:20px}
.fg{margin-bottom:18px}
.flbl{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}
.finput,.fdate{width:100%;padding:13px 14px;border:1.5px solid var(--sand);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;background:white;outline:none;color:var(--dark)}
.finput:focus,.fdate:focus{border-color:var(--coral)}
.vgrid{display:flex;gap:7px;flex-wrap:wrap}
.vchip{padding:9px 16px;border-radius:20px;border:2px solid var(--sand);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:white;color:#1A1208;transition:all 0.1s;min-width:80px;text-align:center}
.vchip.on[data-v=andaluma]{background:#E04F28 !important;color:#FFFFFF !important;border-color:#E04F28}
.vchip.on[data-v=vae]{background:#0A7A88 !important;color:#FFFFFF !important;border-color:#0A7A88}
.vchip.on[data-v=baraca]{background:#C98A10 !important;color:#FFFFFF !important;border-color:#C98A10}
.vchip.on[data-v=personal]{background:#B83368 !important;color:#FFFFFF !important;border-color:#B83368}
.ochips{display:flex;gap:7px}
.ochip{flex:1;padding:10px 4px;border-radius:10px;border:1.5px solid var(--sand);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:white;color:var(--muted);text-align:center;transition:all 0.1s}
.ochip[data-o=andre].on{background:#E04F28 !important;color:#FFFFFF !important;border-color:#E04F28}
.ochip[data-o=daniella].on{background:#B83368 !important;color:#FFFFFF !important;border-color:#B83368}
.ochip[data-o=both].on{background:#0A7A88 !important;color:#FFFFFF !important;border-color:#0A7A88}
.ochip{color:#1A1208 !important}
.imic{display:flex;gap:8px}
.imic .finput{flex:1}
.micbtn{width:48px;border-radius:10px;background:var(--berry);color:white;border:none;cursor:pointer;font-size:17px;flex-shrink:0}
.micbtn.listening{background:var(--coral)}
.sw{width:46px;height:27px;background:var(--sand);border-radius:14px;border:none;cursor:pointer;position:relative;transition:background 0.15s;flex-shrink:0}
.sw.on{background:var(--coral)}
.sw::after{content:'';position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:white;transition:transform 0.15s;box-shadow:0 1px 4px rgba(0,0,0,0.15)}
.sw.on::after{transform:translateX(19px)}
.recrow{display:flex;align-items:center;gap:12px;font-size:14px;font-weight:500}
.recopts{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.recopt{padding:8px 14px;border-radius:8px;border:1.5px solid var(--sand);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;background:white;color:var(--muted)}
.recopt.on{background:var(--amber);color:white;border-color:var(--amber)}
.daychips{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.dchip{padding:6px 10px;border-radius:7px;border:1.5px solid var(--sand);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;background:white;color:var(--muted)}
.dchip.on{background:var(--amber);color:white;border-color:var(--amber)}
.sdcheck{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer;margin-top:10px}
.btn-pri{width:100%;padding:15px;background:var(--coral);color:white;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;box-shadow:0 3px 12px rgba(224,79,40,0.25)}
.btn-pri:active{opacity:0.85}
.alist{display:flex;flex-direction:column}
.aitem{display:flex;align-items:center;gap:14px;padding:15px 0;border-bottom:1px solid var(--sand);cursor:pointer;font-size:15px;font-weight:500}
.aitem:last-child{border-bottom:none}
.aitem.danger{color:#C0392B}
.aicon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.split2{display:flex;gap:8px;margin-top:10px}
.split2 button{flex:1;padding:12px;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer}

/* Force light mode - override Android dark mode */
@media (prefers-color-scheme: dark) {
  html, body { background: #F7F2E8 !important; color: #1A1208 !important; }
  #hdr { background: #1A1208 !important; }
  #owner-wrap, #week-wrap { background: #1A1208 !important; }
  #day-view { background: #F7F2E8 !important; }
  .ti { background: #FFFFFF !important; }
  .msheet { background: #F7F2E8 !important; }
  .finput, .fdate { background: #FFFFFF !important; color: #1A1208 !important; }
  .vchip, .ochip, .recopt, .dchip { background: #FFFFFF !important; }
  .su-card { background: #F7F2E8 !important; }
  .su-ta, .su-in { background: #FFFFFF !important; color: #1A1208 !important; }
}

.pdot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);transition:all 0.15s}
.pdot.filled{background:#E04F28;border-color:#E04F28}
.pkey{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;color:white;font-size:24px;font-family:"DM Sans",sans-serif;font-weight:500;cursor:pointer;transition:background 0.1s}
.pkey:active{background:rgba(255,255,255,0.2)}
.pkey-del{font-size:20px}

<body>
<div id="root">


<!-- PIN LOGIN -->
<div id="pin-screen" style="display:none;min-height:100vh;background:#1A1208;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;width:80px;margin-bottom:24px">
    <div style="background:#E04F28;height:36px;border-radius:4px;display:flex;align-items:center;justify-content:center;color:white;font-family:Georgia,serif;font-weight:700;font-size:12px">An</div>
    <div style="background:#B83368;height:36px;border-radius:4px;display:flex;align-items:center;justify-content:center;color:white;font-family:Georgia,serif;font-weight:700;font-size:12px">Da</div>
    <div style="background:#0A7A88;height:36px;border-radius:4px;display:flex;align-items:center;justify-content:center;color:white;font-family:Georgia,serif;font-weight:700;font-size:12px">Lu</div>
    <div style="background:#C98A10;height:36px;border-radius:4px;display:flex;align-items:center;justify-content:center;color:white;font-family:Georgia,serif;font-weight:700;font-size:12px">Ma</div>
  </div>
  <div style="font-family:Georgia,serif;font-size:28px;color:white;margin-bottom:8px;letter-spacing:0.06em">An·Da·Lu·Ma</div>
  <div style="font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:40px">Enter your PIN to continue</div>
  
  <!-- PIN dots -->
  <div id="pin-dots" style="display:flex;gap:14px;margin-bottom:32px">
    <div class="pdot"></div>
    <div class="pdot"></div>
    <div class="pdot"></div>
    <div class="pdot"></div>
  </div>
  
  <div id="pin-error" style="color:#E04F28;font-size:13px;margin-bottom:16px;min-height:20px;text-align:center"></div>
  
  <!-- Number pad -->
  <div id="pin-pad" style="display:grid;grid-template-columns:repeat(3,72px);gap:10px">
    <button class="pkey" data-n="1">1</button>
    <button class="pkey" data-n="2">2</button>
    <button class="pkey" data-n="3">3</button>
    <button class="pkey" data-n="4">4</button>
    <button class="pkey" data-n="5">5</button>
    <button class="pkey" data-n="6">6</button>
    <button class="pkey" data-n="7">7</button>
    <button class="pkey" data-n="8">8</button>
    <button class="pkey" data-n="9">9</button>
    <div></div>
    <button class="pkey" data-n="0">0</button>
    <button class="pkey pkey-del" data-n="del">&#x232B;</button>
  </div>
</div>
<!-- SETUP -->
<div id="setup" style="display:flex;flex-direction:column">
  <div class="su-hero">
    <div class="su-eyebrow">Your personal planner</div>
    <div class="logo-grid">
      <div class="logo-tile" style="background:var(--coral)">An</div>
      <div class="logo-tile" style="background:var(--berry)">Da</div>
      <div class="logo-tile" style="background:var(--teal)">Lu</div>
      <div class="logo-tile" style="background:var(--amber)">Ma</div>
    </div>
    <div class="su-tagline">A family full of (ad)ventures</div>
  </div>
  <div class="su-card">
    <div class="su-dots">
      <div class="su-dot" style="background:var(--coral)"></div>
      <div class="su-dot" style="background:var(--berry)"></div>
      <div class="su-dot" style="background:var(--teal)"></div>
      <div class="su-dot" style="background:var(--amber)"></div>
    </div>
    <div class="su-section">
      <label class="su-lbl">Firebase config <span>for cloud sync across devices</span></label>
      <textarea class="su-ta" id="fb-in" placeholder='{&#10;  "apiKey": "...",&#10;  "databaseURL": "https://...",&#10;  ...&#10;}'></textarea>
      <div class="su-hint">→ <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a> · New project · Add web app · Copy config JSON · Enable Realtime Database</div>
    </div>
    <div class="su-section">
      <label class="su-lbl">Google Calendar ID <span>optional — add later</span></label>
      <input type="text" class="su-in" id="gcal-in" placeholder="OAuth 2.0 Client ID from Google Cloud Console">
    </div>
    <button class="btn-go" onclick="doSetup()">Let's go →</button>
    <button class="btn-skip" onclick="skipSetup()">Skip — use without cloud sync</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;flex-direction:column;flex:1;min-height:0;height:100vh">
  <div id="hdr"></div>

  <!-- TASKS VIEW -->
  <div id="tasks-view" style="display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden">
    <div id="owner-wrap"></div>
    <div id="week-wrap"></div>
    <div id="day-view" style="flex:1;overflow-y:auto;padding-bottom:80px"></div>
  </div>

  <!-- MONEY VIEW -->
  <div id="money-view" style="display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden">
    <div id="money-trip-bar"></div>
    <div id="money-day-bar"></div>
    <div id="money-content" style="flex:1;overflow-y:auto;padding-bottom:80px;background:var(--cream)"></div>
  </div>

  <!-- INSIGHTS VIEW -->
  <div id="insights-view" style="display:none;flex-direction:column;flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding-bottom:80px;background:var(--cream)"></div>

  <!-- BOTTOM NAV -->
  <div id="bottom-nav" style="position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--dark);display:flex;border-top:1px solid rgba(255,255,255,0.08);z-index:60;padding-bottom:env(safe-area-inset-bottom,0)">
    <button class="nav-btn on" id="nav-tasks" onclick="switchTab('tasks')">
      <div class="nav-icon">✓</div><div class="nav-lbl">Tasks</div>
    </button>
    <button class="nav-btn" id="nav-money" onclick="switchTab('money')">
      <div class="nav-icon">€</div><div class="nav-lbl">Money</div>
    </button>
    <button class="nav-btn" id="nav-insights" onclick="switchTab('insights')">
      <div class="nav-icon">◑</div><div class="nav-lbl">Insights</div>
    </button>
  </div>

  <div id="fab-wrap">
    <div id="fab-mic" onclick="startVoice()">🎤</div>
    <div id="fab" onclick="fabAction()">+</div>
  </div>
</div>

</div>

<!-- MODAL -->
<div id="modal-overlay" style="display:none" onclick="bgClose(event)">
  <div class="msheet" id="mcontent"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
var S={date:td(),owner:'andre',wkOff:0,tasks:{},calEvs:[],showSD:false};
var db=null,offline=false,gcalToken=null,mst={};

var VCOL={andaluma:'#E04F28',vae:'#0A7A88',baraca:'#C98A10',personal:'#B83368','andaluma2':'#E04F28'};

function init(){
  // STEP 1: Check PIN first, always
  if(ls('andaluma-auth') !== 'ok'){
    // Show PIN screen
    document.getElementById('pin-screen').style.display='flex';
    document.getElementById('setup').style.display='none';
    document.getElementById('app').style.display='none';
    return;
  }
  // STEP 2: PIN passed, connect to Firebase (hardcoded config)
  afterPin();
}

function afterPin(){
  var fbConfig = {
    apiKey:'AIzaSyAeYXakpwzgmbl0_Spf2phpBlXjYe_9STA',
    authDomain:'andaluma-planner.firebaseapp.com',
    databaseURL:'https://andaluma-planner-default-rtdb.firebaseio.com',
    projectId:'andaluma-planner',
    storageBucket:'andaluma-planner.firebasestorage.app',
    messagingSenderId:'87759928843',
    appId:'1:87759928843:web:052df60638080d9ad9110e'
  };
  lss('andaluma-fb', JSON.stringify(fbConfig));
  loadLocal();
  boot();
  try{
    if(!firebase.apps.length) firebase.initializeApp(fbConfig);
    db = firebase.database();
    db.ref('tasks').on('value',function(snap){
      S.tasks=snap.val()||{};
      lss('andaluma-tasks',JSON.stringify(S.tasks));
      renderAll();
    });
    loadMoneyData();
  }catch(ex){ db=null; }
}


// ── PIN FUNCTIONS ────────────────────────────────────────
var PIN = '1213';
var pinEntry = '';

function checkAuth(){ return ls('andaluma-auth') === 'ok'; }

function showPin(){
  document.getElementById('pin-screen').style.display = 'flex';
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'none';
}

function pinKey(n){
  if(pinEntry.length >= 4) return;
  pinEntry += String(n);
  updatePinDots();
  if(pinEntry.length === 4) setTimeout(checkPin, 100);
}

function pinDel(){
  pinEntry = pinEntry.slice(0, -1);
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
}

function updatePinDots(){
  var dots = document.querySelectorAll('.pdot');
  dots.forEach(function(d, i){
    if(i < pinEntry.length) d.classList.add('filled');
    else d.classList.remove('filled');
  });
}

function checkPin(){
  if(pinEntry === PIN){
    lss('andaluma-auth', 'ok');
    document.getElementById('pin-screen').style.display = 'none';
    afterPin();
  } else {
    document.getElementById('pin-error').textContent = 'Wrong PIN. Try again.';
    pinEntry = '';
    updatePinDots();
  }
}

// PIN input - click and touch handlers
function handlePinInput(ev){
  var btn = ev.target;
  // Walk up to find data-n
  while(btn && !btn.getAttribute('data-n') && btn !== document.body){
    btn = btn.parentElement;
  }
  if(!btn || !btn.getAttribute('data-n')) return;
  var ps = document.getElementById('pin-screen');
  if(!ps || ps.style.display === 'none') return;
  ev.preventDefault();
  var n = btn.getAttribute('data-n');
  if(n === 'del') pinDel();
  else pinKey(parseInt(n));
}
document.addEventListener('click', handlePinInput);
document.addEventListener('touchend', handlePinInput, {passive:false});

document.addEventListener('keydown', function(ev){
  var ps = document.getElementById('pin-screen');
  if(!ps || ps.style.display === 'none') return;
  if(ev.key >= '0' && ev.key <= '9') pinKey(parseInt(ev.key));
  if(ev.key === 'Backspace') pinDel();
});

document.addEventListener('DOMContentLoaded', function(){ init(); });

function doSetup(){
  var raw=document.getElementById('fb-in').value.trim();
  var gcid=document.getElementById('gcal-in').value.trim();
  try{
    var cfg=JSON.parse(raw);
    lss('andaluma-fb',JSON.stringify(cfg));
    if(gcid)lss('andaluma-gcal',gcid);
    initApp();
  }catch(e){alert('Invalid JSON — copy the full config object from Firebase.');}
}

function skipSetup(){offline=true;lss('andaluma-fb','offline');loadLocal();boot();}

function startFB(cfg){
  try{
    firebase.initializeApp(cfg);
    db=firebase.database();
    // Boot immediately with local data, Firebase will update when ready
    loadLocal();
    boot();
    // Then sync from Firebase
    db.ref('tasks').on('value',function(snap){
      S.tasks=snap.val()||{};
      lss('andaluma-tasks',JSON.stringify(S.tasks));
      renderAll();
    });
  }catch(e){offline=true;loadLocal();boot();}
}

function boot(){
  document.getElementById('setup').style.display='none';
  var app=document.getElementById('app');
  app.style.display='flex';app.style.height='100%';app.style.flexDirection='column';
  renderAll();
  setInterval(renderHdr,30000);
}

function persist(){if(db&&!offline)db.ref('tasks').set(S.tasks);else lss('andaluma-tasks',JSON.stringify(S.tasks));}
function loadLocal(){try{var s=ls('andaluma-tasks');S.tasks=s?JSON.parse(s):{};}catch(e){S.tasks={};}}
function ls(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lss(k,v){try{localStorage.setItem(k,v);}catch(e){}}

function td(){var n=new Date();return n.getFullYear()+'-'+p2(n.getMonth()+1)+'-'+p2(n.getDate());}
function p2(n){return n<10?'0'+n:''+n;}
function addDays(str,d){var dt=new Date(str+'T12:00:00');dt.setDate(dt.getDate()+d);return dt.getFullYear()+'-'+p2(dt.getMonth()+1)+'-'+p2(dt.getDate());}
function weekDays(off){var t=new Date(),dow=t.getDay(),mon=new Date(t);mon.setDate(t.getDate()-((dow+6)%7)+off*7);var r=[];for(var i=0;i<7;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);r.push(d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate()));}return r;}
function dayName(str){return['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][(new Date(str+'T12:00:00').getDay()+6)%7];}
function dayNum(str){return new Date(str+'T12:00:00').getDate();}
function fmtDay(str){return new Date(str+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});}

function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}

function addTask(t){
  var id=uid();
  t.id=id;t.status='todo';t.rolled=false;t.rollCount=0;t.createdAt=Date.now();
  S.tasks[id]=t;persist();renderAll();
}

function addTaskBoth(t){
  // Create one task for André and one for Daniella
  var id1=uid(), id2=uid();
  var t1=Object.assign({},t,{id:id1,owner:'andre',status:'todo',rolled:false,rollCount:0,createdAt:Date.now()});
  var t2=Object.assign({},t,{id:id2,owner:'daniella',status:'todo',rolled:false,rollCount:0,createdAt:Date.now()+1});
  S.tasks[id1]=t1;S.tasks[id2]=t2;persist();renderAll();
}

function updTask(id,chg){if(!S.tasks[id])return;Object.assign(S.tasks[id],chg);persist();renderAll();}
function delTask(id){delete S.tasks[id];persist();renderAll();}

function cycleStatus(id,recurDate){
  if(recurDate){
    var k=id+'_'+recurDate,ov=S.tasks[k],cur=ov?ov.status:'todo';
    var nxt={todo:'inprogress',inprogress:'done',done:'todo'}[cur]||'inprogress';
    if(nxt==='todo')delete S.tasks[k];
    else S.tasks[k]={id:k,status:nxt,_ov:true,parent:id,date:recurDate};
    persist();renderAll();
  }else{
    var t=S.tasks[id];if(!t)return;
    updTask(id,{status:{todo:'inprogress',inprogress:'done',done:'todo'}[t.status]||'inprogress'});
  }
}

function openRoll(id){
  var t=S.tasks[id]; if(!t) return;
  // Generate next 14 days as options
  var days=[];
  for(var i=1;i<=14;i++){
    var d=addDays(t.date||S.date,i);
    var dt=new Date(d+'T12:00:00');
    var label=dt.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
    days.push({d:d,l:label});
  }
  var chips=days.map(function(day){
    return '<div class="dchip roll-day-chip" data-d="'+day.d+'" style="padding:10px 14px;font-size:13px">'+day.l+'</div>';
  }).join('');
  openModal(
    '<div class="mhandle"></div>'+
    '<div class="mtitle">Move to which day?</div>'+
    '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px">'+chips+'</div>'
  );
  setTimeout(function(){
    document.querySelectorAll('.roll-day-chip').forEach(function(el){
      el.addEventListener('click',function(){
        var nd=this.getAttribute('data-d');
        rollTaskToDate(id,nd);
        closeModal();
      });
    });
  },50);
}

function rollTaskToDate(id,newDate){
  var t=S.tasks[id];if(!t)return;
  var nid=uid();
  S.tasks[nid]=Object.assign({},t,{id:nid,date:newDate,status:'todo',rolled:true,rollCount:(t.rollCount||0)+1,createdAt:Date.now()});
  S.tasks[id].status='done';persist();renderAll();
}

function rollTask(id){
  var t=S.tasks[id];if(!t)return;
  var nid=uid(),nd=addDays(t.date||S.date,1);
  S.tasks[nid]=Object.assign({},t,{id:nid,date:nd,status:'todo',rolled:true,rollCount:(t.rollCount||0)+1,createdAt:Date.now()});
  S.tasks[id].status='done';persist();renderAll();
}

function splitTask(id,t1,t2,d2){
  var t=S.tasks[id];if(!t)return;
  S.tasks[id].title=t1;
  var nid=uid();
  S.tasks[nid]=Object.assign({},t,{id:nid,title:t2,date:d2||t.date,status:'todo',rolled:(d2&&d2!==t.date),rollCount:0,createdAt:Date.now()+1});
  persist();renderAll();
}

function tasksForDate(date){
  var res=[],own=S.owner;
  Object.values(S.tasks).forEach(function(t){
    if(t._ov)return;
    if(own!=='both'&&t.owner!==own)return;
    if(t.recurring){
      var ok=false;
      if(t.recurType==='daily'&&t.date&&t.date<=date)ok=true;
      else if(t.recurType==='weekly'&&t.date&&t.date<=date&&t.recurDays){
        var dow=(new Date(date+'T12:00:00').getDay());
        if(t.recurDays.indexOf(dow)>=0)ok=true;
      }
      if(ok){var k=t.id+'_'+date,ov=S.tasks[k];res.push(Object.assign({},t,ov||{},{_ri:true,_rd:date,status:ov?ov.status:(t.status||'todo')}));}
    }else if(t.date===date){res.push(t);}
  });
  var ord={todo:0,inprogress:1,done:2};
  res.sort(function(a,b){return(ord[a.status]||0)-(ord[b.status]||0);});
  return res;
}

function somedayTasks(){
  var own=S.owner;
  return Object.values(S.tasks).filter(function(t){return!t._ov&&(own==='both'||t.owner===own)&&!t.date&&!t.recurring;});
}

function vLabel(v){return{andaluma:'Andaluma',vae:'VAE',baraca:'Baraca',personal:'Personal','andaluma2':'Andaluma'}[v]||v;}

var TZS=[{l:'NL',z:'Europe/Amsterdam',bg:'rgba(224,79,40,0.25)'},{l:'DXB',z:'Asia/Dubai',bg:'rgba(201,138,16,0.25)'},{l:'KR',z:'Asia/Seoul',bg:'rgba(10,122,136,0.25)'}];
function tzTime(z){try{return new Date().toLocaleTimeString('en-GB',{timeZone:z,hour:'2-digit',minute:'2-digit',hour12:false});}catch(e){return'--:--';}}

function renderAll(){renderHdr();renderOwner();renderWeek();renderDay();}

function renderHdr(){
  var gcalId=ls('andaluma-gcal');
  var gcalBtn=gcalId?('<button class="btn-gcal'+(gcalToken?' connected':'')+'" onclick="connectGcal()">'+(gcalToken?'📅 Cal ✓':'📅 Calendar')+'</button>'):'';
  var sync=db&&!offline?'● synced':'○ local';
  var tz=TZS.map(function(t){return'<div class="tz-item" style="background:'+t.bg+'"><div class="tz-lbl">'+t.l+'</div><div class="tz-time">'+tzTime(t.z)+'</div></div>';}).join('');
  document.getElementById('hdr').innerHTML=
    '<div class="hdr-top">'+
    '<div class="hdr-logo-grid">'+
    '<div class="hdr-tile" style="background:var(--coral)">An</div>'+
    '<div class="hdr-tile" style="background:var(--berry)">Da</div>'+
    '<div class="hdr-tile" style="background:var(--teal)">Lu</div>'+
    '<div class="hdr-tile" style="background:var(--amber)">Ma</div>'+
    '</div>'+
    '<div class="hdr-right">'+gcalBtn+'<div class="hdr-sync">'+sync+'</div><button class="gear-btn" onclick="openSettings()">&#9881;&#65039;</button></div>'+
    '</div>'+
    '<div class="tz-bar">'+tz+'</div>';
}

function renderOwner(){
  var os=[{id:'andre',l:'André'},{id:'daniella',l:'Daniella'},{id:'both',l:'Both'}];
  var btns=os.map(function(o){return'<button class="obtn'+(S.owner===o.id?' on':'')+'" data-o="'+o.id+'" onclick="setOwner(\''+o.id+'\')">'+o.l+'</button>';}).join('');
  document.getElementById('owner-wrap').innerHTML='<div class="owner-bar">'+btns+'</div>';
}

function renderWeek(){
  var days=weekDays(S.wkOff),today=td();
  var h='<button class="wk-arr" onclick="shiftWk(-1)">‹</button>';
  days.forEach(function(d){
    var sel=d===S.date,tod=d===today;
    var tasks=tasksForDate(d);
    // gather unique ventures for dots
    var vs={};tasks.forEach(function(t){if(t.venture)vs[t.venture]=true;});
    var dots=Object.keys(vs).slice(0,4).map(function(v){return'<div class="wk-vdot" style="background:'+(VCOL[v]||'#999')+'"></div>';}).join('');
    h+='<div class="wk-day'+(sel?' sel':'')+(tod&&!sel?' tod':'')+'" onclick="selDate(\''+d+'\')">'+
      '<div class="wk-dn">'+dayName(d)+'</div>'+
      '<div class="wk-num">'+dayNum(d)+'</div>'+
      '<div class="wk-dots">'+dots+'</div>'+
      '</div>';
  });
  h+='<button class="wk-arr" onclick="shiftWk(1)">›</button>';
  document.getElementById('week-wrap').innerHTML=h;
}

function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderTaskItem(t){
  var v=t.venture||'personal',st=t.status||'todo',cb=st==='done'?'✓':'';
  var tags='<span class="vbadge" data-v="'+e(v)+'">'+e(vLabel(v))+'</span>';
  if(t.rolled)tags+='<span class="tag-roll">↩'+(t.rollCount>1?' '+t.rollCount+'×':'')+'</span>';
  if(t.recurring||t._ri)tags+='<span class="tag-rec">↻</span>';
  if(S.owner==='both')tags+='<span class="tag-own" data-o="'+e(t.owner||'andre')+'">'+(t.owner==='daniella'?'D':'A')+'</span>';
var cbc=t._ri?'cycleStatus(\''+t.id+'\',\''+e(t._rd||'')+'\')':'cycleStatus(\''+t.id+'\',\'\')';
  return'<div class="ti '+st+(t.rolled?' rolled':'')+'" data-v="'+e(v)+'">'+
    '<div class="ti-accent"></div>'+
    '<div class="ti-inner">'+
    '<button class="ti-cb" onclick="'+cbc+'">'+cb+'</button>'+
    '<div class="ti-body"><div class="ti-title">'+e(t.title)+'</div><div class="ti-tags">'+tags+'</div></div>'+
    '<button class="ti-more" onclick="openMenu(\''+e(t.id)+'\')">⋯</button>'+
    '</div></div>';
}

function renderDay(){
  var tasks=tasksForDate(S.date),sd=somedayTasks();
  var done=tasks.filter(function(t){return t.status==='done';}).length;
  var d=new Date(S.date+'T12:00:00');
  var h='';
  if(S.calEvs.length){
    h+='<div class="sec-divider"><div class="sec-divider-lbl" style="color:var(--teal)">Calendar</div><div class="sec-divider-line" style="background:rgba(10,122,136,0.2)"></div></div>';
    S.calEvs.forEach(function(ev){var t=ev.start&&ev.start.dateTime?new Date(ev.start.dateTime).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false}):'All day';h+='<div class="cal-ev"><div class="cal-time">'+e(t)+'</div><div class="cal-title">'+e(ev.summary||'')+'</div></div>';});
  }
  h+='<div class="day-hdr"><div class="day-title">'+e(d.toLocaleDateString('en-GB',{weekday:'long'}))+'</div>'+
    '<div class="day-meta">'+e(d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}))+
    (tasks.length?' · '+done+'/'+tasks.length+' done':'')+'</div></div>';
  h+='<div class="tlist">';
  if(!tasks.length)h+='<div class="empty"><div class="empty-icon">✦</div><div class="empty-txt">Nothing here.<br>Tap <strong>+</strong> to add a task.</div></div>';
  else tasks.forEach(function(t){h+=renderTaskItem(t);});
  h+='</div>';
  h+='<div class="someday-hdr"><div class="someday-title">Someday</div>'+
    '<button class="someday-toggle" onclick="toggleSD()">'+(S.showSD?'Hide':'Show ('+sd.length+')')+'</button></div>';
  if(S.showSD){
    h+='<div class="tlist" style="padding-top:0">';
    if(!sd.length)h+='<div class="empty"><div class="empty-txt">Nothing in someday yet.</div></div>';
    else sd.forEach(function(t){h+=renderTaskItem(t);});
    h+='</div>';
  }
  document.getElementById('day-view').innerHTML=h;
}

function setOwner(o){S.owner=o;renderOwner();renderWeek();renderDay();}
function selDate(d){S.date=d;var days=weekDays(S.wkOff);if(days.indexOf(d)<0){var diff=Math.round((new Date(d+'T12:00:00')-new Date())/604800000);S.wkOff=Math.round(diff);}if(gcalToken)fetchCal(d);renderWeek();renderDay();}
function shiftWk(dir){S.wkOff+=dir;renderWeek();}
function toggleSD(){S.showSD=!S.showSD;renderDay();}

function openModal(html){document.getElementById('mcontent').innerHTML=html;document.getElementById('modal-overlay').style.display='flex';}
function closeModal(){document.getElementById('modal-overlay').style.display='none';mst={};}
function bgClose(ev){if(ev.target===document.getElementById('modal-overlay'))closeModal();}

function openAdd(pre){
  mst={title:pre||'',venture:'andaluma',owner:S.owner==='both'?'both':S.owner,date:S.date,someday:false,rec:false,recType:'daily',recDays:[],manualDate:''};
  drawAdd();
}

function drawAdd(){
  var m=mst;
  var vs=[{id:'andaluma',l:'Andaluma'},{id:'vae',l:'VAE'},{id:'baraca',l:'Baraca'},{id:'personal',l:'Personal'}];
  var os=[{id:'andre',l:'André'},{id:'daniella',l:'Daniella'},{id:'both',l:'Both'}];
  var wds=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var vch=vs.map(function(v){return'<div class="vchip'+(m.venture===v.id?' on':'')+'" data-v="'+v.id+'" onclick="mst.venture=\''+v.id+'\';drawAdd()">'+v.l+'</div>';}).join('');
  var och=os.map(function(o){return'<div class="ochip'+(m.owner===o.id?' on':'')+'" data-o="'+o.id+'" onclick="mst.owner=\''+o.id+'\';drawAdd()">'+o.l+'</div>';}).join('');
  var reh='';
  if(m.rec){
    reh='<div class="recopts">'+
      '<div class="recopt'+(m.recType==='daily'?' on':'')+'" onclick="mst.recType=\'daily\';drawAdd()">Daily</div>'+
      '<div class="recopt'+(m.recType==='weekly'?' on':'')+'" onclick="mst.recType=\'weekly\';drawAdd()">Weekly</div>'+
      '<div class="recopt'+(m.recType==='manual'?' on':'')+'" onclick="mst.recType=\'manual\';drawAdd()">Specific date</div>'+
      '</div>';
    if(m.recType==='weekly'){
      reh+='<div class="daychips">'+wds.map(function(d,i){return'<div class="dchip'+(m.recDays.indexOf(i)>=0?' on':'')+'" onclick="tRD('+i+')">'+d+'</div>';}).join('')+'</div>';
    }
    if(m.recType==='manual'){
      reh+='<div style="margin-top:8px"><input type="date" class="fdate" id="t-manual-date" value="'+e(m.manualDate)+'" onchange="mst.manualDate=this.value;mst.date=this.value"></div>';
    }
  }
  openModal(
    '<div class="mhandle"></div><div class="mtitle">New task</div>'+
    '<div class="fg"><label class="flbl">Title</label><div class="imic">'+
    '<input type="text" class="finput" id="t-title" value="'+e(m.title)+'" placeholder="What needs doing?" oninput="mst.title=this.value">'+
    '<button class="micbtn" id="t-mic" onclick="voiceForInput()">🎤</button></div></div>'+
    '<div class="fg"><label class="flbl">Venture</label><div class="vgrid">'+vch+'</div></div>'+
    '<div class="fg"><label class="flbl">For</label><div class="ochips">'+och+'</div></div>'+
    '<div class="fg"><label class="flbl">Date</label>'+
    '<input type="date" class="fdate" id="t-date" value="'+(m.someday?'':m.date)+'" onchange="mst.date=this.value" '+(m.someday||m.recType==='manual'&&m.rec?'disabled':'')+'>'+

function renderTripBar(){
  var el = document.getElementById('money-trip-bar');
  if(!el) return;
  var today = td();
  var trips = Object.values(MS.trips);
  // Sort: active trip first, then reverse chronological by startDate
  trips.sort(function(a,b){
    var aActive = a.id === MS.activeTripId, bActive = b.id === MS.activeTripId;
    if(aActive && !bActive) return -1;
    if(!aActive && bActive) return 1;
    return (b.startDate||'') > (a.startDate||'') ? 1 : -1;
  });
  var html = '<div class="trip-bar">';
  trips.forEach(function(t){
    var on = t.id === MS.activeTripId;
    html += '<button class="trip-chip'+(on?' on':'')+'" onclick="setActiveTrip(\''+e(t.id)+'\')">'+e(t.name)+'</button>';
  });
  html += '<button class="trip-chip add" onclick="openAddTrip()">+ Trip</button>';
  html += '</div>';
  el.innerHTML = html;
}

function autoSelectTrip(){
  var today = td();
  var trips = Object.values(MS.trips);
  // Find trip where today falls within startDate..endDate
  var current = trips.find(function(t){
    return t.startDate && t.startDate <= today && (!t.endDate || t.endDate >= today);
  });
  if(current){ MS.activeTripId = current.id; return; }
  // Otherwise pick most recent trip
  trips.sort(function(a,b){ return (b.startDate||'') > (a.startDate||'') ? 1 : -1; });
  if(trips.length) MS.activeTripId = trips[0].id;
}

// ── ADD EXPENSE ─────────────────────────────────────────
var emst = {};
function inferTripCurrency(tripId){
  if(!tripId) return null;
  var trip = MS.trips[tripId];
  if(trip && trip.currency) return trip.currency;
  // Infer from most-used non-EUR currency in this trip's expenses
  var counts = {};
  Object.values(MS.expenses).forEach(function(ex){
    if(ex.tripId===tripId && ex.originalCurrency && ex.originalCurrency!=='EUR')
      counts[ex.originalCurrency] = (counts[ex.originalCurrency]||0)+1;
  });
  var best = Object.keys(counts).sort(function(a,b){return counts[b]-counts[a];})[0];
  return best||null;
}
function openAddExpense(){
  var activeTrip = MS.activeTripId ? MS.trips[MS.activeTripId] : null;
  var defCur = inferTripCurrency(MS.activeTripId) || 'EUR';
  emst = {
    title:'', category:'Food', owner: S.owner==='both'?'both':S.owner,
    currency:defCur, amount:'', note:'', date:MS.moneyDate,
    tripId: MS.activeTripId||'', preTrip:false,
    checkIn: MS.moneyDate||'', checkOut:'',
  };
  drawAddExpense();
}

function drawAddExpense(){
  var m = emst;
  var catOpts = Object.keys(CATS).map(function(c){
    var on = c===m.category;
    return '<option value="'+e(c)+'"'+(on?' selected':'')+'>'+CATS[c].icon+' '+c+'</option>';
  }).join('');
  var tripCur = inferTripCurrency(MS.activeTripId);
  var pinned = [];
  if(tripCur) pinned.push(tripCur);
  if(pinned.indexOf('USD')<0) pinned.push('USD');
  if(pinned.indexOf('EUR')<0) pinned.push('EUR');
  var rest = CURRENCIES.filter(function(c){ return pinned.indexOf(c)<0; }).sort();
  var orderedCurs = pinned.concat(rest);
  var currOpts = orderedCurs.map(function(c){
    return '<option'+(c===m.currency?' selected':'')+'>'+c+'</option>';
  }).join('');
  var trips = Object.values(MS.trips);
  var tripOpts = '<option value="">No trip</option>'+trips.map(function(t){
    return '<option value="'+e(t.id)+'"'+(t.id===m.tripId?' selected':'')+'>'+e(t.name)+'</option>';
  }).join('');
  var os = [{id:'andre',l:'André'},{id:'daniella',l:'Daniella'},{id:'both',l:'Both'}];
  var och = os.map(function(o){
    return '<div class="ochip'+(m.owner===o.id?' on':'')+'" data-o="'+o.id+'" onclick="emst.owner=\''+o.id+'\';drawAddExpense()">'+o.l+'</div>';
  }).join('');
  openModal(
    '<div class="mhandle"></div><div class="mtitle">Add expense</div>'+
    '<div class="fg"><label class="flbl">Amount</label>'+
    '<div style="display:flex;gap:8px">'+
    '<select class="finput" style="width:90px;flex-shrink:0" onchange="emst.currency=this.value">'+currOpts+'</select>'+
    '<input type="number" class="finput" id="exp-amt" placeholder="0.00" value="'+e(m.amount)+'" oninput="emst.amount=this.value" style="flex:1">'+
    '</div></div>'+
    '<div class="fg"><label class="flbl">What for</label>'+
    '<input type="text" class="finput" id="exp-title" value="'+e(m.title)+'" placeholder="Description (optional)" oninput="emst.title=this.value"></div>'+
    '<div class="fg"><label class="flbl">Category</label>'+
    '<select class="finput" onchange="emst.category=this.value;drawAddExpense()">'+catOpts+'</select></div>'+
    '<div class="fg"><label class="flbl">Paid by</label><div class="ochips">'+och+'</div></div>'+
    '<div class="fg"><label class="flbl">Trip</label>'+
    '<select class="finput" onchange="emst.tripId=this.value">'+tripOpts+'</select>'+
    '<label class="sdcheck"><input type="checkbox" '+(m.preTrip?'checked':'')+' onchange="emst.preTrip=this.checked;drawAddExpense()"> Pre-trip expense (no specific day)</label></div>'+
    (function(){
      if(m.preTrip) return '';
      if(m.category==='Accommodation'){
        var nights=0, perNightNote='';
        if(m.checkIn && m.checkOut && m.checkOut>m.checkIn){
          nights=Math.round((new Date(m.checkOut)-new Date(m.checkIn))/86400000);
          if(nights>0 && parseFloat(m.amount)>0){
            var pn=(parseFloat(m.amount)/nights).toFixed(2);
            perNightNote=' · '+m.currency+' '+pn+'/night';
          }
        }
        return '<div class="fg"><label class="flbl">Check-in date</label>'+
          '<input type="date" class="fdate" value="'+e(m.checkIn||'')+'" onchange="emst.checkIn=this.value;drawAddExpense()"></div>'+
          '<div class="fg"><label class="flbl">Check-out date</label>'+
          '<input type="date" class="fdate" value="'+e(m.checkOut||'')+'" onchange="emst.checkOut=this.value;drawAddExpense()">'+
          (nights>0?'<div style="font-size:12px;color:var(--amber);margin-top:5px;font-weight:600">'+nights+' night'+(nights===1?'':'s')+perNightNote+'</div>':'')+
          '</div>';
      }
      return '<div class="fg"><label class="flbl">Date</label><input type="date" class="fdate" value="'+e(m.date)+'" onchange="emst.date=this.value"></div>';
    })()+
    '<button class="btn-pri" onclick="submitExpense()">Add expense</button>'
  );
  setTimeout(function(){ var el=document.getElementById('exp-amt'); if(el) el.focus(); }, 80);
}

function submitExpense(){
  var amt = parseFloat((document.getElementById('exp-amt')||{}).value||emst.amount||0);
  if(!amt){ alert('Enter an amount.'); return; }
  var title = (document.getElementById('exp-title')||{}).value||emst.title||'';

  if(emst.category==='Accommodation' && !emst.preTrip){
    if(!emst.checkIn || !emst.checkOut || emst.checkOut<=emst.checkIn){
      alert('Enter valid check-in and check-out dates.'); return;
    }
    var nights = Math.round((new Date(emst.checkOut)-new Date(emst.checkIn))/86400000);
    if(nights<1){ alert('Check-out must be after check-in.'); return; }
    fetchRate(emst.currency, function(rate){
      var perNight = amt/nights;
      var eurPerNight = Math.round((emst.currency==='EUR' ? perNight : perNight*rate)*100)/100;
      var perNightOrig = Math.round(perNight*100)/100;
      for(var i=0;i<nights;i++){
        var day=new Date(emst.checkIn); day.setDate(day.getDate()+i);
        var dateStr=day.toISOString().slice(0,10);
        var id=muid();
        MS.expenses[id]={
          id:id, title:(title.trim()||'Accommodation'),
          category:'Accommodation', owner:emst.owner,
          originalAmount:perNightOrig, originalCurrency:emst.currency,
          eurAmount:eurPerNight, lockedRate:rate,
          date:dateStr, tripId:emst.tripId||null,
          notes:emst.note||'', createdAt:Date.now()+i,
          venture:'personal', type:'expense',
        };
      }
      persistMoney(); closeModal(); renderMoney(); renderInsights();
    });
    return;
  }

  fetchRate(emst.currency, function(rate){
    var eurAmt = emst.currency==='EUR' ? amt : amt * rate;
    var id = muid();
    MS.expenses[id] = {
      id: id,
      title: title.trim(),
      category: emst.category,
      owner: emst.owner,
      originalAmount: amt,
      originalCurrency: emst.currency,
      eurAmount: Math.round(eurAmt*100)/100,
      lockedRate: rate,
      date: emst.preTrip ? null : (emst.date||MS.moneyDate),
      tripId: emst.tripId||null,
      notes: emst.note||'',
      createdAt: Date.now(),
      venture: 'personal',
      type: 'expense',
    };
    persistMoney();
    closeModal();
    renderMoney();
  });
}

// ── EXCHANGE RATES ───────────────────────────────────────
var rateCache = {};
// Hardcoded fallback rates (EUR per 1 unit of currency) — used only if API fails
var RATE_FALLBACK = {
  USD:0.92, GBP:1.17, JPY:0.0061, KRW:0.00067, TWD:0.029, CNY:0.13,
  AED:0.25, VND:0.000037, MXN:0.053, CAD:0.68, PEN:0.24, AUD:0.60,
  CHF:1.04, SGD:0.69, THB:0.026, IDR:0.000058, MYR:0.20, PHP:0.016,
  INR:0.011, BRL:0.18, COP:0.00023, CLP:0.00098, TRY:0.027, NOK:0.086,
  SEK:0.088, DKK:0.134, NZD:0.55, ZAR:0.049, HKD:0.118, SAR:0.245,
  QAR:0.252, KWD:2.99, BHD:2.65, MNT:0.00027, RUB:0.0099, GEL:0.34,
};
function fetchRate(currency, cb){
  if(currency==='EUR'){ cb(1); return; }
  if(rateCache[currency]){ cb(rateCache[currency]); return; }
  fetch('https://api.frankfurter.app/latest?from='+currency+'&to=EUR')
    .then(function(r){ return r.json(); })
    .then(function(data){
      var rate = data.rates && data.rates.EUR ? data.rates.EUR : null;
      if(rate && rate > 0){
        rateCache[currency] = rate;
        cb(rate);
      } else {
        cb(RATE_FALLBACK[currency] || 1);
      }
    })
    .catch(function(){ cb(RATE_FALLBACK[currency] || 1); });
}

  }).join('');

  var rest = CURRENCIES.filter(function(c){ return pinned.indexOf(c)<0; }).sort();
  var currOpts = pinned.concat(rest).map(function(c){
    return '<option'+(c===m.currency?' selected':'')+'>'+c+'</option>';
  }).join('');

// ── INSIGHTS ────────────────────────────────────────────
function renderInsights(){
  var el = document.getElementById('insights-view');
  if(!el) return;
  var allExps = Object.values(MS.expenses).filter(function(ex){ return ex.eurAmount > 0; });

  // By category
  var byCat = {};
  allExps.forEach(function(ex){
    var c = ex.category||'Others';
    byCat[c] = (byCat[c]||0) + (ex.eurAmount||0);
  });
  var catTotal = Object.values(byCat).reduce(function(s,v){return s+v;},0);
  var catSorted = Object.keys(byCat).sort(function(a,b){return byCat[b]-byCat[a];});

  // By trip
  var byTrip = {};
  allExps.forEach(function(ex){
    var t = ex.tripId ? (MS.trips[ex.tripId] ? MS.trips[ex.tripId].name : 'Unknown') : 'General';
    byTrip[t] = (byTrip[t]||0) + (ex.eurAmount||0);
  });
  var tripTotal = Object.values(byTrip).reduce(function(s,v){return s+v;},0);
  var tripSorted = Object.keys(byTrip).sort(function(a,b){return byTrip[b]-byTrip[a];});

  // By month
  var byMonth = {};
  allExps.forEach(function(ex){
    if(!ex.date) return;
    var m = ex.date.substr(0,7);
    byMonth[m] = (byMonth[m]||0)+(ex.eurAmount||0);
  });
  var monthSorted = Object.keys(byMonth).sort();

  // Overall stats
  var totalEur = allExps.reduce(function(s,ex){return s+(ex.eurAmount||0);},0);
  var totalDays = monthSorted.length ? 30 : 1;
  var avgDaily = totalDays > 0 ? totalEur/Math.max(1,allExps.length) : 0;

  var html = '';

  // Stats
  html += '<div class="ins-section">'+
    '<div class="ins-title">Overview</div>'+
    '<div class="ins-stat-grid">'+
    '<div class="ins-stat"><div class="ins-stat-val">€'+Math.round(totalEur).toLocaleString()+'</div><div class="ins-stat-lbl">Total tracked</div></div>'+
    '<div class="ins-stat"><div class="ins-stat-val">'+allExps.length+'</div><div class="ins-stat-lbl">Expenses</div></div>'+
    '<div class="ins-stat"><div class="ins-stat-val">'+Object.keys(MS.trips).length+'</div><div class="ins-stat-lbl">Trips</div></div>'+
    '<div class="ins-stat"><div class="ins-stat-val">'+catSorted.length+'</div><div class="ins-stat-lbl">Categories</div></div>'+
    '</div></div>';

  // By category
  html += '<div class="ins-section"><div class="ins-title">By category</div>';
  catSorted.slice(0,8).forEach(function(c){
    var cat = CATS[c]||CATS['Others'];
    var pct = catTotal > 0 ? Math.round(byCat[c]/catTotal*100) : 0;
    html += '<div class="ins-row" style="cursor:pointer" onclick="showCatDrilldown(\''+e(c)+'\')">'+
      '<div class="ins-row-label"><div class="ins-dot" style="background:'+cat.color+'"></div>'+e(c)+'</div>'+
      '<div class="ins-bar-wrap"><div class="ins-bar" style="width:'+pct+'%;background:'+cat.color+'"></div></div>'+
      '<div class="ins-val">€'+Math.round(byCat[c])+'<span style="color:var(--muted);font-weight:400;font-size:10px;margin-left:4px">›</span></div>'+
    '</div>';
  });
  html += '</div>';

  // By trip
  html += '<div class="ins-section"><div class="ins-title">By destination</div>';
  var tripColors = [VCOL.coral, VCOL.teal, VCOL.amber, VCOL.berry, '#2D5C3A','#7A6E5A'];
  tripSorted.forEach(function(t,i){
    var pct = tripTotal > 0 ? Math.round(byTrip[t]/tripTotal*100) : 0;
    var col = tripColors[i%tripColors.length]||'#7A6E5A';
    html += '<div class="ins-row">'+
      '<div class="ins-row-label"><div class="ins-dot" style="background:'+col+'"></div>'+e(t)+'</div>'+
      '<div class="ins-bar-wrap"><div class="ins-bar" style="width:'+pct+'%;background:'+col+'"></div></div>'+
      '<div class="ins-val">€'+Math.round(byTrip[t])+'</div>'+
    '</div>';
  });
  html += '</div>';

  // By month
  if(monthSorted.length){
    var maxMonth = Math.max.apply(null, monthSorted.map(function(m){return byMonth[m];}));
    html += '<div class="ins-section"><div class="ins-title">By month</div>';
    monthSorted.forEach(function(m){
      var pct = maxMonth > 0 ? Math.round(byMonth[m]/maxMonth*100) : 0;
      var label = new Date(m+'-15').toLocaleDateString('en-GB',{month:'short',year:'numeric'});
      html += '<div class="ins-row">'+
        '<div class="ins-row-label" style="min-width:60px">'+e(label)+'</div>'+
        '<div class="ins-bar-wrap"><div class="ins-bar" style="width:'+pct+'%;background:var(--coral)"></div></div>'+
        '<div class="ins-val">€'+Math.round(byMonth[m])+'</div>'+
      '</div>';
    });
    html += '</div>';
  }

  el.innerHTML = html;
}

var _ddState = {cat:'', sort:'amount-desc'};
function showCatDrilldown(category, sort){
  sort = sort || _ddState.sort || 'amount-desc';
  _ddState = {cat:category, sort:sort};
  var cat = CATS[category]||CATS['Others'];
  var exps = Object.values(MS.expenses).filter(function(ex){
    return ex.category === category && ex.eurAmount > 0;
  });
  if(sort==='amount-asc') exps.sort(function(a,b){ return (a.eurAmount||0)-(b.eurAmount||0); });
  else if(sort==='date-desc') exps.sort(function(a,b){ return (b.date||'')>(a.date||'') ? 1 : -1; });
  else exps.sort(function(a,b){ return (b.eurAmount||0)-(a.eurAmount||0); });
  var total = exps.reduce(function(s,ex){ return s+(ex.eurAmount||0); }, 0);
  var sortDefs = [{id:'amount-desc',label:'↓ Highest'},{id:'amount-asc',label:'↑ Lowest'},{id:'date-desc',label:'New → Old'}];
  var chips = sortDefs.map(function(s){
    var on = s.id===sort;
    return '<button onclick="showCatDrilldown(\''+e(category)+'\',\''+s.id+'\')" style="padding:5px 11px;border-radius:14px;border:1.5px solid '+(on?cat.color:'var(--sand)')+';background:'+(on?cat.color+'22':'transparent')+';color:'+(on?cat.color:'var(--muted)')+';font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap">'+s.label+'</button>';
  }).join('');
  var rows = exps.map(function(ex){
    var dateLabel = ex.date ? new Date(ex.date+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'}) : 'Pre-trip';
    var trip = ex.tripId && MS.trips[ex.tripId] ? MS.trips[ex.tripId].name : '';
    return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--sand)">'+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+e(ex.title||category)+'</div>'+
        '<div style="font-size:10px;color:var(--muted);margin-top:2px">'+dateLabel+(trip?' \xb7 '+e(trip):'')+'</div>'+
      '</div>'+
      '<div style="font-size:14px;font-weight:700;color:'+cat.color+';flex-shrink:0;margin-left:8px">€'+(ex.eurAmount||0).toFixed(2)+'</div>'+
      '<button onclick="openExpMenu(\''+ex.id+'\')" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px;padding:2px 4px;flex-shrink:0;line-height:1">⋯</button>'+
    '</div>';
  }).join('');
  openModal(
    '<div class="mhandle"></div>'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'+
      '<div style="width:36px;height:36px;border-radius:8px;background:'+cat.color+'22;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">'+cat.icon+'</div>'+
      '<div><div class="mtitle" style="margin-bottom:0">'+e(category)+'</div>'+
      '<div style="font-size:11px;color:var(--muted)">'+exps.length+' expenses \xb7 €'+Math.round(total)+' total</div></div>'+
    '</div>'+
    '<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">'+chips+'</div>'+
    rows
  );
}

function voiceForInput(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Voice input not supported in this browser. Try Chrome.');return;}
  var btn=document.getElementById('t-mic');
  if(btn){btn.textContent='⏹';btn.classList.add('listening');}
  recog=new SR();recog.lang='en-US';recog.interimResults=false;recog.maxAlternatives=1;
  recog.onresult=function(ev){var txt=ev.results[0][0].transcript;var inp=document.getElementById('t-title');if(inp){inp.value=txt;mst.title=txt;}if(btn){btn.textContent='🎤';btn.classList.remove('listening');}};
  recog.onerror=recog.onend=function(){if(btn){btn.textContent='🎤';btn.classList.remove('listening');}};
  recog.start();
}

var gcalTC=null;
function connectGcal(){
  var cid=ls('andaluma-gcal');
  if(!cid){
    var newId=prompt('Enter your Google Calendar OAuth Client ID:');
    if(!newId)return;
    lss('andaluma-gcal',newId.trim());
    cid=newId.trim();
  }
  if(!window.google||!window.google.accounts){alert('Google library not loaded. Check internet connection.');return;}
  if(!gcalTC){
    gcalTC=google.accounts.oauth2.initTokenClient({
      client_id:cid,
      scope:'https://www.googleapis.com/auth/calendar.readonly',
      callback:function(r){if(!r.error){gcalToken=r.access_token;fetchCal(S.date);renderHdr();}}
    });
  }
  gcalTC.requestAccessToken();
}

function fetchCal(date){
  if(!gcalToken)return;
  var s=new Date(date+'T00:00:00').toISOString(),en=new Date(date+'T23:59:59').toISOString();
  fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin='+encodeURIComponent(s)+'&timeMax='+encodeURIComponent(en)+'&singleEvents=true&orderBy=startTime',{headers:{Authorization:'Bearer '+gcalToken}})
  .then(function(r){return r.json();}).then(function(data){S.calEvs=data.items||[];renderDay();}).catch(function(){});
}
