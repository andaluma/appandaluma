name: Weekly Firebase Backup

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Firebase data
        run: |
          DATE=$(date +%Y-%m-%d)

          # Fetch all three nodes from Firebase and save to temp files
          curl -s "https://andaluma-planner-default-rtdb.firebaseio.com/expenses.json" > /tmp/expenses.json
          curl -s "https://andaluma-planner-default-rtdb.firebaseio.com/trips.json" > /tmp/trips.json
          curl -s "https://andaluma-planner-default-rtdb.firebaseio.com/tasks.json" > /tmp/tasks.json

          # Combine into one backup file using Python
          python3 - << 'PYEOF'
          import json, datetime

          with open('/tmp/expenses.json') as f:
              expenses = json.load(f)
          with open('/tmp/trips.json') as f:
              trips = json.load(f)
          with open('/tmp/tasks.json') as f:
              tasks = json.load(f)

          date = datetime.date.today().isoformat()
          backup = {
              'exportDate': date,
              'source': 'GitHub Actions auto-backup',
              'expenses': expenses,
              'trips': trips,
              'tasks': tasks,
          }

          filename = 'backups/andaluma-backup-' + date + '.json'
          with open(filename, 'w') as f:
              json.dump(backup, f, indent=2)

          print('Backup saved: ' + filename)
          print('Expenses: ' + str(len(expenses or {})))
          print('Trips: ' + str(len(trips or {})))
          print('Tasks: ' + str(len(tasks or {})))
          PYEOF

      - name: Commit backup
        run: |
          git config user.name "Andaluma Backup Bot"
          git config user.email "backup@andaluma.com"
          git add backups/
          git diff --staged --quiet || git commit -m "🗄️ Auto backup $(date +%Y-%m-%d)"
          git push
